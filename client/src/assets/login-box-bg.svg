<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glowing central node -->
  <circle cx="200" cy="200" r="40" fill="rgba(255, 255, 255, 0.15)"/>
  <circle cx="200" cy="200" r="20" fill="rgba(255, 255, 255, 0.4)"/>
  <circle cx="200" cy="200" r="8" fill="#ffffff"/>

  <!-- Satellite nodes and connections -->
  <g stroke="rgba(255, 255, 255, 0.3)" stroke-width="2">
    <line x1="200" y1="200" x2="80" y2="100"/>
    <line x1="200" y1="200" x2="320" y2="120"/>
    <line x1="200" y1="200" x2="100" y2="300"/>
    <line x1="200" y1="200" x2="300" y2="280"/>
    <line x1="80" y1="100" x2="120" y2="50"/>
    <line x1="320" y1="120" x2="360" y2="180"/>
    <line x1="100" y1="300" x2="180" y2="350"/>
    <line x1="300" y1="280" x2="350" y2="320"/>
  </g>

  <!-- Nodes -->
  <circle cx="80" cy="100" r="6" fill="#ffffff"/>
  <circle cx="120" cy="50" r="4" fill="rgba(255, 255, 255, 0.8)"/>
  
  <circle cx="320" cy="120" r="6" fill="#ffffff"/>
  <circle cx="360" cy="180" r="4" fill="rgba(255, 255, 255, 0.8)"/>

  <circle cx="100" cy="300" r="6" fill="#ffffff"/>
  <circle cx="180" cy="350" r="4" fill="rgba(255, 255, 255, 0.8)"/>

  <circle cx="300" cy="280" r="6" fill="#ffffff"/>
  <circle cx="350" cy="320" r="4" fill="rgba(255, 255, 255, 0.8)"/>

  <!-- Data packets (small circles on lines) -->
  <circle cx="140" cy="150" r="3" fill="#60A5FA"/>
  <circle cx="260" cy="160" r="3" fill="#60A5FA"/>
  <circle cx="150" cy="250" r="3" fill="#60A5FA"/>
  <circle cx="250" cy="240" r="3" fill="#60A5FA"/>

  <!-- Abstract rings around center -->
  <circle cx="200" cy="200" r="120" stroke="rgba(255, 255, 255, 0.1)" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
  <circle cx="200" cy="200" r="160" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" stroke-dasharray="2 6" fill="none"/>
</svg>
